<html>
<body>
<style>
#chat-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #10a37f;
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
}

#chatbox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 350px;
  height: 500px;
  background: #1e1e1e;
  border-radius: 12px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  font-family: Arial, sans-serif;
}

#chat-header {
  background: #10a37f;
  padding: 15px;
  color: white;
  font-weight: bold;
}

#chat-messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  font-size: 14px;
}

.message {
  margin-bottom: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  max-width: 80%;
}

.user {
  background: #2a2a2a;
  color: white;
  align-self: flex-end;
}

.bot {
  background: #333;
  color: #ddd;
  align-self: flex-start;
}

#chat-input-area {
  display: flex;
  border-top: 1px solid #333;
}

#chat-input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  background: #2a2a2a;
  color: white;
}

#send-btn {
  background: #10a37f;
  border: none;
  color: white;
  padding: 10px 15px;
  cursor: pointer;
}
</style>

<button id="chat-toggle">Chat</button>

<div id="chatbox">
  <div id="chat-header">AI Assistant</div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <input id="chat-input" placeholder="Type a message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const toggleBtn = document.getElementById("chat-toggle");
const chatbox = document.getElementById("chatbox");
const sendBtn = document.getElementById("send-btn");
const input = document.getElementById("chat-input");
const messages = document.getElementById("chat-messages");

toggleBtn.onclick = () => {
  chatbox.style.display = chatbox.style.display === "flex" ? "none" : "flex";
  chatbox.style.display = "flex";
};

function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.classList.add("message", className);
  msg.textContent = text;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function botReply(userText) {
  let reply = "I'm just a demo bot 🤖";

  if (userText.toLowerCase().includes("price")) {
    reply = "Our pricing starts at $99/month.";
  } else if (userText.toLowerCase().includes("contact")) {
    reply = "You can contact us at support@example.com";
  } else if (userText.toLowerCase().includes("hello")) {
    reply = "Hello! How can I help you today?";
  }

  setTimeout(() => addMessage(reply, "bot"), 500);
}

sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  input.value = "";
  botReply(text);
};

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendBtn.click();
});
</script>
</body>
</html>
