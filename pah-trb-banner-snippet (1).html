<!--
  ============================================================
  PATIENT ACQUISITION HUB — TRY REVIEW BLOOM REDIRECT BANNER
  ============================================================
  PLACEMENT: Paste the <a> block INSIDE the hero section,
  immediately BEFORE the <h1> tag.

  The <style> block goes in your <head>
  <link rel="icon" type="image/png" href="/CAH.png"> or alongside your
  existing styles. Uses CAH's teal palette (#1a6b6b).
  ============================================================
-->

<!-- STYLES: add inside <head> or your existing <style> block -->
<style>
  .trb-redirect-bar {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(26, 107, 107, 0.10);
    border: 1px solid rgba(26, 107, 107, 0.30);
    border-radius: 999px;
    padding: 8px 16px 8px 12px;
    margin-bottom: 28px;
    font-size: 0.875rem;
    color: #0f4c4c;
    text-decoration: none;
    transition: background 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
  }

  .trb-redirect-bar:hover {
    background: rgba(26, 107, 107, 0.18);
    border-color: rgba(26, 107, 107, 0.50);
  }

  .trb-redirect-bar .trb-icon {
    font-size: 1rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .trb-redirect-bar .trb-text {
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .trb-redirect-bar .trb-link {
    font-weight: 700;
    color: #1a6b6b;
    white-space: nowrap;
  }

  .trb-redirect-bar .trb-arrow {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-left: 2px;
  }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .trb-redirect-bar {
      background: rgba(95, 198, 198, 0.10);
      border-color: rgba(95, 198, 198, 0.25);
      color: #a8e6e6;
    }
    .trb-redirect-bar .trb-link {
      color: #5fc6c6;
    }
  }
</style>

<!-- BANNER HTML: paste before your <h1> -->
<a
  href="https://www.tryreviewbloom.com"
  class="trb-redirect-bar"
  aria-label="Not a dental practice? Try Review Bloom serves all London local businesses"
>
  <span class="trb-icon">🌱</span>
  <span class="trb-text">
    Not a dental practice?
    <span class="trb-link">Try Review Bloom</span>
    serves all London local businesses
  </span>
  <span class="trb-arrow">→</span>
</a>
