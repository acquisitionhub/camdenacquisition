
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missed Call Workflow</title>
<style>
  body { margin: 0; padding: 32px; background: #f7f3ee; font-family: sans-serif; display: flex; justify-content: center; }
  svg { max-width: 680px; width: 100%; }

  .t  { font-family: sans-serif; font-size: 14px; font-weight: 400; fill: #1a1a1a; }
  .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }

  /* c-coral */
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  /* c-purple */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  /* c-teal */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* c-blue */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  /* c-amber */
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  /* c-red */
  .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red .th { fill: #791F1F; }
  .c-red .ts { fill: #A32D2D; }

  /* c-green */
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green .th { fill: #27500A; }
  .c-green .ts { fill: #3B6D11; }

  .arr { fill: none; stroke: #888780; stroke-width: 1.5; }
</style>
</head>
<body>
<svg viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Step 1: Missed Call -->
<g class="c-coral">
  <rect x="220" y="20" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Missed call detected</text>
  <text class="ts" x="340" y="61" text-anchor="middle" dominant-baseline="central">GHL phone system logs it instantly</text>
</g>

<line x1="340" y1="76" x2="340" y2="110" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2: Lead Created -->
<g class="c-purple">
  <rect x="220" y="110" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="132" text-anchor="middle" dominant-baseline="central">Contact created as lead</text>
  <text class="ts" x="340" y="151" text-anchor="middle" dominant-baseline="central">CRM captures caller, adds to pipeline</text>
</g>

<line x1="340" y1="166" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3: Voicemail Transcription -->
<g class="c-teal">
  <rect x="220" y="200" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="222" text-anchor="middle" dominant-baseline="central">Voicemail transcribed</text>
  <text class="ts" x="340" y="241" text-anchor="middle" dominant-baseline="central">AI transcribes to text — staff reads instantly</text>
</g>

<line x1="340" y1="256" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

<!-- Step 4: SMS + Email -->
<g class="c-blue">
  <rect x="220" y="290" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="312" text-anchor="middle" dominant-baseline="central">Instant SMS + email sent</text>
  <text class="ts" x="340" y="331" text-anchor="middle" dominant-baseline="central">Includes click-to-book appointment link</text>
</g>

<line x1="340" y1="346" x2="340" y2="380" class="arr" marker-end="url(#arrow)"/>

<!-- Step 5: Segmentation -->
<g class="c-amber">
  <rect x="220" y="380" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="402" text-anchor="middle" dominant-baseline="central">Lead segmented by service</text>
  <text class="ts" x="340" y="421" text-anchor="middle" dominant-baseline="central">Implants, cosmetic = high priority tag</text>
</g>

<line x1="340" y1="436" x2="340" y2="460" class="arr" marker-end="url(#arrow)"/>

<!-- Decision diamond -->
<polygon points="340,460 390,490 340,520 290,490" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
<text class="ts" x="340" y="493" text-anchor="middle" dominant-baseline="central">Responded?</text>

<!-- Yes branch -->
<line x1="390" y1="490" x2="530" y2="490" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="460" y="482" text-anchor="middle">Yes</text>
<g class="c-teal">
  <rect x="530" y="464" width="120" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="590" y="486" text-anchor="middle" dominant-baseline="central">Appointment</text>
  <text class="ts" x="590" y="503" text-anchor="middle" dominant-baseline="central">booked ✓</text>
</g>

<!-- No branch -->
<line x1="340" y1="520" x2="340" y2="558" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="542" text-anchor="start">No</text>

<!-- Step 6: Staff alert -->
<g class="c-red">
  <rect x="220" y="558" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="580" text-anchor="middle" dominant-baseline="central">Staff callback alert sent</text>
  <text class="ts" x="340" y="599" text-anchor="middle" dominant-baseline="central">Manual follow-up task assigned in GHL</text>
</g>

<line x1="340" y1="614" x2="340" y2="648" class="arr" marker-end="url(#arrow)"/>

<!-- Step 7: Revenue tracked -->
<g class="c-green">
  <rect x="220" y="648" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="670" text-anchor="middle" dominant-baseline="central">Revenue attributed</text>
  <text class="ts" x="340" y="689" text-anchor="middle" dominant-baseline="central">Dashboard tracks ROI per recovered call</text>
</g>

<!-- GHL labels left -->
<text class="ts" x="30" y="48" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="62" text-anchor="middle" fill="#888780">Trigger</text>
<line x1="56" y1="48" x2="218" y2="48" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts" x="30" y="138" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="152" text-anchor="middle" fill="#888780">CRM</text>
<line x1="56" y1="138" x2="218" y2="138" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts" x="30" y="228" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="242" text-anchor="middle" fill="#888780">Voicemail</text>
<line x1="60" y1="228" x2="218" y2="228" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts" x="30" y="318" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="332" text-anchor="middle" fill="#888780">Workflow</text>
<line x1="62" y1="318" x2="218" y2="318" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts" x="30" y="408" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="422" text-anchor="middle" fill="#888780">Tags</text>
<line x1="56" y1="408" x2="218" y2="408" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts" x="30" y="584" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="598" text-anchor="middle" fill="#888780">Tasks</text>
<line x1="56" y1="584" x2="218" y2="584" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="ts" x="30" y="674" text-anchor="middle" fill="#888780">GHL</text>
<text class="ts" x="30" y="688" text-anchor="middle" fill="#888780">Reporting</text>
<line x1="62" y1="674" x2="218" y2="674" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3"/>

</svg>
</body>
</html>
