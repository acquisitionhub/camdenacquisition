<!DOCTYPE html>
<html lang="en-GB">
<head>
  <link rel="icon" type="image/png" href="/CAH.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Revenue Recovery Calculator — Camden Acquisition Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #0e1a1c; --ink2: #2a3e41; --ink3: #4a6366;
    --paper: #f4f0e8; --paper2: #ece8df; --paper3: #e2ddd3;
    --teal: #0d6b61; --teal-l: #138a7d; --teal-ll:#e2f2f0;
    --gold: #c8832a; --serif: 'DM Serif Display', serif; --sans: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); padding: 0 20px 80px; }
  .page { max-width: 560px; margin: 0 auto; }
  header { padding: 50px 0 30px; text-align: center; }
  .hero-title { font-family: var(--serif); font-size: clamp(32px, 7vw, 48px); line-height: 1.1; margin-bottom: 10px; }
  .hero-title em { font-style: italic; color: var(--teal); }
  .card { background: #fff; border: 1px solid var(--paper3); border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--teal), var(--gold)); }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--ink3); margin-bottom: 8px; }
  input[type="text"], input[type="email"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--paper3); border-radius: 8px; font-size: 16px; background: #fafafa; }
  .slider-big { font-family: var(--serif); font-size: 60px; color: var(--teal); text-align: center; margin-bottom: 5px; }
  .slider-unit { text-align: center; font-size: 12px; color: var(--ink3); text-transform: uppercase; margin-bottom: 15px; }
  input[type="range"] { width: 100%; height: 6px; background: var(--paper3); border-radius: 5px; cursor: pointer; accent-color: var(--teal); }
  .ticker { display: flex; justify-content: space-between; align-items: center; background: var(--teal-ll); margin: 25px -30px -30px; padding: 15px 30px; border-radius: 0 0 20px 20px; }
  .ticker-val { font-family: var(--serif); font-size: 28px; color: var(--teal); }
  .btn { display: block; width: 100%; padding: 18px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; text-align: center; }
  .btn-teal { background: var(--teal); color: #fff; }
  .btn-gold { background: var(--gold); color: #fff; margin-top: 15px; }
  .panel { display: none; }
  .panel.on { display: block; }
  .err { color: #c0392b; font-size: 12px; display: none; margin-top: 5px; }
  .err.on { display: block; }
  .result-loss { font-family: var(--serif); font-size: 60px; color: var(--teal); text-align: center; margin: 10px 0; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
  .stat { background: var(--paper); padding: 15px; border-radius: 10px; text-align: center; }
  .stat-v { font-family: var(--serif); font-size: 24px; color: var(--teal); }
</style>
</head>

<body>
<div class="page">
  <header>
    <h1 class="hero-title">Practice <em>Revenue</em> Calculator</h1>
  </header>

  <!-- STEP 1 -->
  <div class="panel on" id="p1">
    <div class="card">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fname" placeholder="Dr. Name">
        <span class="err" id="err-name">Enter your name</span>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@practice.com">
        <span class="err" id="err-email">Enter a valid email</span>
      </div>
      <div class="field">
        <label>Practice Name</label>
        <input type="text" id="pname" placeholder="Optional">
      </div>
    </div>
    <button class="btn btn-teal" onclick="go(2)">Next Step →</button>
  </div>

  <!-- STEP 2 -->
  <div class="panel" id="p2">
    <div class="card">
      <div class="slider-big" id="disp-missed">5</div>
      <div class="slider-unit">Calls missed per day</div>
      <input type="range" id="miss-slider" min="1" max="50" value="5" oninput="updateLive()">
      
      <div class="field" style="margin-top:30px">
        <label>Average Patient Value (£)</label>
        <input type="number" id="pval" value="250" oninput="updateLive()">
      </div>

      <div class="ticker">
        <span>Monthly Loss:</span>
        <div class="ticker-val" id="live-loss">£37,500</div>
      </div>
    </div>
    <button class="btn btn-teal" id="calc-btn" onclick="sendResults()">Calculate Results →</button>
  </div>

  <!-- STEP 3 -->
  <div class="panel" id="p3">
    <div class="card" style="text-align:center">
      <label>Your Monthly Loss</label>
      <div class="result-loss" id="res-mo">£0</div>
      <p>Annual Loss: <strong id="res-yr">£0</strong></p>
      
      <div class="stat-grid">
        <div class="stat"><div class="stat-v" id="res-miss">0</div><label>Missed/Mo</label></div>
        <div class="stat"><div class="stat-v" id="res-val">£0</div><label>Value</label></div>
      </div>
    </div>
    <button class="btn btn-gold" onclick="window.location.href='https://camdenacquisitionhub.com/missed-call.html'">See How it works</button>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  // 1. Initialize immediately with your Public Key
  (function() {
    emailjs.init({
      publicKey: "Q2eKuuLp_3c7mdLC6",
    });
  })();

  function fmt(n) { return '£' + Math.round(n).toLocaleString('en-GB'); }

  function updateLive() {
    const m = document.getElementById('miss-slider').value;
    const v = document.getElementById('pval').value || 0;
    document.getElementById('disp-missed').textContent = m;
    document.getElementById('live-loss').textContent = fmt(m * v * 30);
  }

  function go(n) {
    if (n === 2) {
      const name = document.getElementById('fname').value;
      const email = document.getElementById('email').value;
      if (!name) { document.getElementById('err-name').classList.add('on'); return; }
      if (!email || !email.includes('@')) { document.getElementById('err-email').classList.add('on'); return; }
    }
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    document.getElementById('p' + n).classList.add('on');
    window.scrollTo(0,0);
  }

  async function sendResults() {
    const btn = document.getElementById('calc-btn');
    
    // Capture fresh values
    const uEmail = document.getElementById('email').value.trim();
    const uName = document.getElementById('fname').value.trim();
    const uPrac = document.getElementById('pname').value.trim() || "Not provided";
    const m = document.getElementById('miss-slider').value;
    const v = document.getElementById('pval').value;
    
    const moLoss = m * v * 30;
    const yrLoss = moLoss * 12;

    btn.disabled = true;
    btn.textContent = "Sending...";

    // This object matches your dashboard {{tags}}
    const templateParams = {
        to_name: uName,
        to_email: uEmail,
        practice_name: uPrac,
        missed_calls: m,
        patient_value: fmt(v),
        monthly_loss: fmt(moLoss),
        annual_loss: fmt(yrLoss)
    };

    try {
      // 2. The Actual Send Command
      const response = await emailjs.send("service_s6stsxi", "template_tu7pr0j", templateParams);
      console.log('SUCCESS!', response.status, response.text);
      
      // Update Step 3 Result Display
      document.getElementById('res-mo').textContent = fmt(moLoss);
      document.getElementById('res-yr').textContent = fmt(yrLoss);
      document.getElementById('res-miss').textContent = (m * 30).toLocaleString();
      document.getElementById('res-val').textContent = fmt(v);
      
      go(3);
    } catch (err) {
      // 3. This will tell us the EXACT reason for failure in an alert
      console.error('FAILED...', err);
      const errorMsg = err?.text || err?.message || "Unknown Error";
      alert("EmailJS Error: " + errorMsg);
      
      btn.disabled = false;
      btn.textContent = "Calculate Results →";
    }
  }
</script>
</body>
</html>
