<!-- ======= Missed Call Revenue Calculator Section ======= -->
<section id="calculator" style="max-width:800px; margin:0 auto; padding:40px; text-align:center; font-family:sans-serif;">
  
  <!-- HERO / HEADLINE -->
  <h1>How many new patients is your dental practice losing from missed calls?</h1>
  <p>Patient acquisition & missed call recovery for UK dental practices.<br>Calculate how much revenue you’re losing every month in seconds.</p>

  <!-- INPUTS -->
  <div style="margin:20px 0;">
    <input id="missedCalls" type="number" placeholder="Missed calls per day" style="padding:10px; width:150px; margin-right:10px;">
    <input id="patientValue" type="number" placeholder="Average patient value (£)" style="padding:10px; width:150px; margin-right:10px;">
    <button id="calcBtn" style="padding:10px 20px; background:#2a9d8f; color:#fff; border:none; cursor:pointer;">Calculate Lost Revenue</button>
  </div>

  <!-- RESULT -->
  <p id="result" style="font-weight:bold; font-size:1.2em; margin:20px 0;"></p>

  <!-- DYNAMIC CTA -->
  <button id="demoBtn" onclick="bookDemo()" style="padding:15px 30px; background:#e63946; color:#fff; border:none; cursor:pointer; font-size:1em;">
    Book a Free Demo
  </button>
  <p id="urgencyText" style="margin-top:10px; font-style:italic; color:#555;">Every missed call today is a patient booking somewhere else.</p>
</section>

<!-- ======= SCRIPT ======= -->
<script>
  // CALCULATE FUNCTION
  function calculate() {
    const missedCalls = parseFloat(document.getElementById("missedCalls").value);
    const patientValue = parseFloat(document.getElementById("patientValue").value);

    if (!missedCalls || !patientValue) return;

    updateResult(missedCalls, patientValue);
  }

  // UPDATE RESULT + DYNAMIC CTA
  function updateResult(missedCalls, patientValue) {
    const monthlyLoss = missedCalls * patientValue * 30;

    const formatted = monthlyLoss.toLocaleString('en-GB', {
      style: 'currency',
      currency: 'EUR',
      maximumFractionDigits: 0
    });

    // Show result
    document.getElementById("result").innerText =
      `You're losing approximately ${formatted} per month from missed calls.`;

    // Update CTA button text dynamically
    document.getElementById("demoBtn").innerText =
      `Recover My ${formatted}/month`;
  }

  // REDIRECT FUNCTION
  function bookDemo() {
    // Replace with actual booking page URL
    window.location.href = "patient-acquisition-hub.html";
  }

  // CONNECT BUTTON TO CALCULATE
  document.getElementById("calcBtn").addEventListener("click", calculate);
</script>
