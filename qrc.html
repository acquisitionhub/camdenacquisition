<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camden Acquisition Hub QR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap');

        :root {
            --color-border: #e2e8f0;
            --color-bg: #ffffff;
            --color-text-main: #1a202c;
            --color-text-sub: #718096;
            --brand-blue: #185FA5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Centering Logic */
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Takes full height of the viewport */
            padding: 20px;
        }

        .card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px; /* Mobile friendly limit */
        }

        .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: var(--color-text-main);
            margin-bottom: 6px;
        }

        .sub {
            font-size: 11px;
            color: var(--color-text-sub);
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }

        #qr {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        /* Ensures the QR canvas is responsive */
        #qr img, #qr canvas {
            max-width: 100% !important;
            height: auto !important;
        }

        .url {
            font-size: 14px;
            color: var(--brand-blue);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .cta {
            font-size: 13px;
            color: var(--color-text-sub);
        }

        /* Privacy & Consent Module Placeholder */
        .consent-module {
            margin-top: 2rem;
            font-size: 10px;
            color: #a0aec0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">Camden Acquisition Hub</div>
    <div class="sub">Scan to visit our website</div>
    
    <div id="qr"></div>
    
    <div class="url">camdenacquisitionhub.com</div>
    <div class="cta">Book a free 20-minute demo</div>

    <div class="consent-module">
        By scanning, you agree to our Privacy Policy. <br> 
        We value your data security.
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    new QRCode(document.getElementById('qr'), {
        text: 'https://camdenacquisitionhub.com',
        width: 220,
        height: 220,
        colorDark: '#185FA5',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
    });
</script>

</body>
</html>
